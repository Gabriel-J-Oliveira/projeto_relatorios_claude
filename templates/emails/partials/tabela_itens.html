{% if anexos_linhas %}
<div style="margin-top:18px;">
  <div style="font-size:14px; font-weight:700; color:#111827; margin-bottom:8px;">Arquivos gerados</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse; border:1px solid #e5e7eb;">
    {% for item in anexos_linhas %}
    <tr>
      <td style="padding:10px 14px; border-top:1px solid #e5e7eb; font-size:13px; color:#374151;">{{ item }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endif %}
