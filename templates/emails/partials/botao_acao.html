{% if action_url %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0 4px;">
  <tr>
    <td>
      <a href="{{ action_url }}" style="display:inline-block; background:#1f5fbf; color:#ffffff; text-decoration:none; font-size:14px; font-weight:700; padding:12px 20px; border-radius:8px;">
        {{ action_label|default:"Abrir relatório" }}
      </a>
    </td>
  </tr>
</table>
{% endif %}
