{% load crispy_forms_tags %}

<div class="row justify-content-center">
  <div class="col-12 col-xl-10">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent border-bottom py-3 d-flex align-items-center gap-2">
        <i class="bi {{ icone|default:'bi-pencil-square' }} text-primary fs-5"></i>
        <h6 class="mb-0 fw-semibold">{{ titulo_form|default:titulo_pagina }}</h6>
      </div>
      <div class="card-body py-4 px-4">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <hr class="my-4">
          <div class="d-flex gap-2 justify-content-end">
            <a href="{{ url_cancelar }}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>{{ acao|default:"Salvar" }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
