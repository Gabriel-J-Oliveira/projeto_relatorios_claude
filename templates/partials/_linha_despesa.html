<tr class="linha-despesa"
    id="linha-despesa-nova-{{ idx }}"
    data-form-index="{{ idx }}"
    {% if form.instance.pk %}data-pk="{{ form.instance.pk }}"{% endif %}>
  <td class="p-1 px-3 pt-3 col-md-1">
    <input type="hidden"
           name="despesas-{{ idx }}-id"
           id="id_despesas-{{ idx }}-id"
           value="{{ form.id.value|default:'' }}">
    <input type="hidden"
           name="despesas-{{ idx }}-ordem"
           id="id_despesas-{{ idx }}-ordem"
           value="{{ idx }}">
    <div class="d-none">
      <input type="checkbox"
             name="despesas-{{ idx }}-DELETE"
             id="id_despesas-{{ idx }}-DELETE"
             {% if form.DELETE.value %}checked{% endif %}>
    </div>
    <input type="date"
           name="despesas-{{ idx }}-data"
           id="id_despesas-{{ idx }}-data"
           value="{{ form.data.value|default:'' }}"
           class="form-control form-control-sm {% if form.data.errors %}is-invalid{% endif %}">
    <div class="invalid-feedback d-block small erro-inline">
      {% if form.data.errors %}{{ form.data.errors.0 }}{% endif %}
    </div>
  </td>
  <td class="p-1 pt-3 col-md-1">
    <select name="despesas-{{ idx }}-tipo"
            id="id_despesas-{{ idx }}-tipo"
            class="form-select form-select-sm {% if form.tipo.errors %}is-invalid{% endif %}">
      {% for value, label in form.fields.tipo.choices %}
        <option value="{{ value }}"
                {% if form.tipo.value == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
    <div class="invalid-feedback d-block small erro-inline">
      {% if form.tipo.errors %}{{ form.tipo.errors.0 }}{% endif %}
    </div>
    <div class="text-warning small aviso-refeicao"></div>
  </td>
  <td class="p-1 pt-3 col-md-2">
    <input type="text"
           name="despesas-{{ idx }}-descricao"
           id="id_despesas-{{ idx }}-descricao"
           value="{{ form.descricao.value|default:'' }}"
           placeholder="Fornecedor / Detalhe"
           class="form-control form-control-sm">
    <div class="text-warning small aviso-inline"></div>
    <div class="text-warning small aviso-duplicata"></div>
</td>
  <td class="p-1 pt-3 col-md-1">
    <input type="number"
           step="0.01"
           name="despesas-{{ idx }}-valor"
           id="id_despesas-{{ idx }}-valor"
           value="{{ form.valor.value|default:'' }}"
           class="form-control form-control-sm campo-valor-desp"
           oninput="recalcular()">
    <div class="invalid-feedback d-block small erro-inline">
      {% if form.valor.errors %}{{ form.valor.errors.0 }}{% endif %}
    </div>
    <div class="text-warning small aviso-inline"></div>
  </td>
  <td class="p-1 pt-3 col-md-1">
    <select name="despesas-{{ idx }}-quem_pagou"
            id="id_despesas-{{ idx }}-quem_pagou"
            class="form-select form-select-sm campo-quem-pagou"
            onchange="recalcular()">
      <option value="tecnico"
              {% if form.quem_pagou.value == "tecnico" %}selected{% endif %}>Técnico</option>
      <option value="empresa"
              {% if form.quem_pagou.value == "empresa" %}selected{% endif %}>Empresa</option>
    </select>
  </td>
  <td class="p-1 text-center text-nowrap col-md-3 pt-3">
    {% if form.instance.comprovante %}
      <a href="{{ form.instance.comprovante.url }}"
         target="_blank"
         class="btn btn-sm btn-outline-success d-inline-flex align-items-center gap-1 px-2 py-1 mb-1">
        <i class="bi bi-file-earmark-check small"></i>
        Atual
      </a>
    {% endif %}
    <label class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-1 px-2 py-1 mb-0 cursor-pointer">
      <i class="bi bi-paperclip small"></i>
      <input type="file"
             name="despesas-{{ idx }}-comprovante"
             id="id_despesas-{{ idx }}-comprovante"
             class="form-sm"
             onchange=" this.parentElement.classList.replace( 'btn-outline-secondary', 'btn-success' )">
    </label>
  </td>
  <td class="p-1 pt-3 col-md-3">
    <input type="text"
           name="despesas-{{ idx }}-observacoes"
           id="id_despesas-{{ idx }}-observacoes"
           value="{{ form.observacoes.value|default:'' }}"
           placeholder="Observação"
           class="form-control form-control-sm w-100">
      <div class="text-warning small aviso-inline"></div>

  </td>
  <td class="p-1 text-center text-nowrap pe-3 pt-3">
    <button type="button"
            class="btn btn-sm btn-outline-danger"
            onclick="removerLinha(this)">
      <i class="bi bi-trash3"></i> Remover
    </button>
  </td>
</tr>
