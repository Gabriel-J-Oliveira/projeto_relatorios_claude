<tr class="linha-trecho"
    id="linha-trecho-nova-{{ idx }}"
    data-form-index="{{ idx }}">
  <td class="p-1 px-3">
    {{ form.id }}{{ form.ordem }}
    <div class="d-none">{{ form.DELETE }}</div>
    {{ form.data }}
  </td>
  <td class="p-1">{{ form.origem }}</td>
  <td class="p-1">{{ form.destino }}</td>
  <td class="p-1">{{ form.km }}</td>
  <td class="p-1">{{ form.valor_km }}</td>
  <td class="p-1 fw-bold text-dark small total-trecho">R$ 0,00</td>
  <td class="p-1">{{ form.observacao }}</td>
  <td class="p-1 text-center pe-3">
    <button type="button"
            class="btn btn-sm btn-outline-danger text-nowrap"
            onclick="removerLinha(this)"
            title="Remover linha">
      <i class="bi bi-trash3"></i>
    </button>
  </td>
</tr>
