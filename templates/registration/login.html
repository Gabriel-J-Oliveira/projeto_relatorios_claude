<!doctype html>
<html lang="pt-br" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Campo Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-body-secondary min-vh-100 d-flex align-items-center">
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <div class="mb-4">
              <div class="d-inline-flex align-items-center justify-content-center rounded bg-primary text-white mb-3"
                   style="width: 42px; height: 42px;">
                <i class="bi bi-shield-lock"></i>
              </div>
              <h1 class="h4 mb-1">Campo Manager</h1>
              <p class="text-muted small mb-0">Acesse com seu usuário autorizado.</p>
            </div>

            {% if form.errors %}
              <div class="alert alert-danger py-2 small">
                Usuário ou senha inválidos.
              </div>
            {% endif %}

            <form method="post" novalidate>
              {% csrf_token %}
              <input type="hidden" name="next" value="{{ next }}">

              <div class="mb-3">
                <label for="{{ form.username.id_for_label }}" class="form-label small fw-semibold">Usuário</label>
                <input type="text"
                       name="{{ form.username.html_name }}"
                       id="{{ form.username.id_for_label }}"
                       class="form-control"
                       autocomplete="username"
                       required
                       autofocus>
              </div>

              <div class="mb-3">
                <label for="{{ form.password.id_for_label }}" class="form-label small fw-semibold">Senha</label>
                <input type="password"
                       name="{{ form.password.html_name }}"
                       id="{{ form.password.id_for_label }}"
                       class="form-control"
                       autocomplete="current-password"
                       required>
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Entrar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
