<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Campo Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --login-surface: rgba(8, 20, 38, 0.68);
      --login-border: rgba(255, 255, 255, 0.18);
      --login-text: #f8fafc;
      --login-muted: rgba(226, 232, 240, 0.78);
      --login-accent: #2f80ed;
      --login-accent-strong: #1f6ed4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--login-text);
      background: #07111f;
      overflow-x: hidden;
    }

    .login-page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      isolation: isolate;
    }

    .login-page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: url("/media/Jpg/NovaMarca_Controlsul_AF1.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(4px) saturate(0.9);
      transform: scale(1.035);
    }

    .login-page::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 18% 12%, rgba(47, 128, 237, 0.26), transparent 28%),
        linear-gradient(135deg, rgba(2, 8, 23, 0.9), rgba(7, 18, 36, 0.76) 48%, rgba(0, 0, 0, 0.82));
    }

    .login-shell {
      width: min(100%, 440px);
    }

    .login-card {
      width: 100%;
      border: 1px solid var(--login-border);
      border-radius: 28px;
      background: var(--login-surface);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .login-card__inner {
      padding: 38px;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 18px;
      margin-bottom: 30px;
    }

    .brand-logo {
      width: min(260px, 84%);
      height: auto;
      display: block;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.34));
    }

    .brand-title {
      margin: 0;
      font-size: 1.28rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-subtitle {
      max-width: 300px;
      margin: 6px auto 0;
      color: var(--login-muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .login-alert {
      border: 1px solid rgba(248, 113, 113, 0.28);
      border-radius: 16px;
      color: #fecaca;
      background: rgba(127, 29, 29, 0.34);
    }

    .form-label {
      color: rgba(248, 250, 252, 0.9);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .input-group-text,
    .login-input {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.1);
      color: var(--login-text);
    }

    .input-group-text {
      width: 46px;
      justify-content: center;
      border-radius: 14px 0 0 14px;
      color: rgba(226, 232, 240, 0.74);
    }

    .login-input {
      min-height: 48px;
      border-radius: 0 14px 14px 0;
      box-shadow: none;
      transition: border-color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
    }

    .login-input::placeholder {
      color: rgba(226, 232, 240, 0.46);
    }

    .login-input:focus {
      border-color: rgba(96, 165, 250, 0.72);
      background: rgba(255, 255, 255, 0.15);
      color: var(--login-text);
      box-shadow: 0 0 0 0.22rem rgba(47, 128, 237, 0.22);
    }

    .login-button {
      min-height: 50px;
      border: 0;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--login-accent), var(--login-accent-strong));
      font-weight: 700;
      color: #fff;
      box-shadow: 0 16px 36px rgba(31, 110, 212, 0.32);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .login-button:hover,
    .login-button:focus {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 20px 42px rgba(31, 110, 212, 0.42);
      color: #fff;
    }

    .login-footer {
      padding-top: 22px;
      color: rgba(226, 232, 240, 0.66);
      font-size: 0.78rem;
      text-align: center;
    }

    @media (max-width: 575.98px) {
      .login-page {
        padding: 22px 14px;
      }

      .login-card {
        border-radius: 22px;
      }

      .login-card__inner {
        padding: 28px 22px;
      }

      .brand-logo {
        width: min(230px, 88%);
      }
    }
  </style>
</head>
<body>
  <main class="login-page">
    <section class="login-shell" aria-label="Acesso ao sistema">
      <div class="login-card">
        <div class="login-card__inner">
          <div class="brand-block">
            <img
              src="/Media/Png/NovaMarca_Controlsul_AF2.png"
              alt="Control Sul Gestão Empresarial"
              class="brand-logo"
            >
            <div>
              <h1 class="brand-title">Relatórios de viagem</h1>
              <p class="brand-subtitle">Acesse o ambiente interno de relatórios técnicos e controle financeiro.</p>
            </div>
          </div>

          {% if form.errors %}
            <div class="alert login-alert py-2 px-3 small mb-3" role="alert">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              Usuário ou senha inválidos.
            </div>
          {% endif %}

          <form method="post" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="mb-3">
              <label for="{{ form.username.id_for_label }}" class="form-label">Usuário</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person"></i>
                </span>
                <input type="text"
                       name="{{ form.username.html_name }}"
                       id="{{ form.username.id_for_label }}"
                       class="form-control login-input"
                       placeholder="Digite seu usuário"
                       autocomplete="username"
                       required
                       autofocus>
              </div>
            </div>

            <div class="mb-4">
              <label for="{{ form.password.id_for_label }}" class="form-label">Senha</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>
                <input type="password"
                       name="{{ form.password.html_name }}"
                       id="{{ form.password.id_for_label }}"
                       class="form-control login-input"
                       placeholder="Digite sua senha"
                       autocomplete="current-password"
                       required>
              </div>
            </div>

            <button type="submit" class="btn login-button w-100">
              Acessar sistema
              <i class="bi bi-arrow-right-short ms-1"></i>
            </button>
          </form>

          <div class="login-footer">
            Acesso restrito a usuários autorizados.
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
